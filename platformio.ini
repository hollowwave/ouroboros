[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.partitions = min_spiffs.csv

build_flags =
    -DCORE_DEBUG_LEVEL=0

    -DUSER_SETUP_LOADED=1

    -DST7735_DRIVER
    -DTFT_WIDTH=128
    -DTFT_HEIGHT=128
    -DST7735_GREENTAB=3

    -DTFT_CS=5
    -DTFT_DC=2
    -DTFT_RST=4
    -DTFT_MOSI=23
    -DTFT_SCLK=18
    -DTFT_MISO=-1

    -DSPI_FREQUENCY=27000000

    -DLOAD_GLCD
    -DLOAD_FONT2
    -DLOAD_FONT4
    -DLOAD_FONT6
    -DLOAD_FONT7
    -DLOAD_FONT8
    -DLOAD_GFXFF
    -DSMOOTH_FONT

lib_deps =
    bodmer/TFT_eSPI
    lsatan/SmartRC-CC1101-Driver-Lib
    mathertel/OneButton
